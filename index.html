.card{background:#111;border-radius:12px;padding:12px;margin-bottom:6px;border:1px solid #222}
h3{font-size:12px;color:#fbbf24;margin-bottom:4px}
.up{color:#ef4444}.down{color:#22c55e}.warn{color:#fbbf24}.info{color:#60a5fa}
.tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.tab{padding:6px 10px;border-radius:16px;border:1px solid #334155;background:#111;color:#94a3b8;font-size:10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.tab.active{background:#fbbf24;color:#0a0a1a;border-color:#fbbf24;font-weight:700}
.tab.has-result{border-color:#22c55e;color:#22c55e}
.tab.live{border-color:#ef4444;color:#ef4444;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.match{display:flex;align-items:center;gap:8px;padding:4px 0}
.match .flag{font-size:26px;width:32px;text-align:center;flex-shrink:0}
.match .team{flex:1;font-size:12px;font-weight:700}
.match .role{font-size:8px;color:#64748b;display:block}
.match .vs{font-size:14px;font-weight:900;color:#334155}
.score-box{font-size:18px;font-weight:900;font-family:monospace;color:#fbbf24;text-align:center;min-width:50px}
.result-tag{display:inline-block;padding:1px 8px;border-radius:3px;font-size:10px;font-weight:700;color:#fbbf24;background:rgba(251,191,36,.15)}
.preds{display:flex;gap:4px;margin-top:4px}
.pred{flex:1;text-align:center;background:#1a1a2e;border-radius:8px;padding:5px 2px}
.pred .s{font-size:13px;font-weight:700;font-family:monospace;color:#fbbf24}
.pred .p{font-size:8px;color:#64748b}
.bar{height:3px;border-radius:2px;margin-top:2px;background:#222;overflow:hidden}
.bar-fill{height:100%;background:#fbbf24}
.wdl{display:flex;gap:10px;font-size:9px;color:#94a3b8;margin-top:3px}
.analysis{background:#0d1117;border-radius:8px;padding:8px;margin-top:6px;font-size:9px;border:1px solid #1a1a2e}
.analysis .factor{display:flex;justify-content:space-between;margin:2px 0;color:#94a3b8}
.analysis .factor-label{flex:1;font-size:8px}
.analysis .factor-bar{width:60px;height:2px;background:#222;border-radius:1px;margin:auto 4px;position:relative}
.analysis .factor-bar-fill{height:100%;border-radius:1px;position:absolute;top:0}
.mystic-badge{display:inline-block;font-size:8px;padding:2px 6px;border-radius:8px;margin:2px;font-weight:700}
.mystic-badge.danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.mystic-badge.warn{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.mystic-badge.info{background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
.tier-tag{font-size:7px;padding:1px 4px;border-radius:3px;margin-right:2px}
.tier-tag.t1{background:rgba(239,68,68,.2);color:#ef4444}
.tier-tag.t2{background:rgba(251,191,36,.2);color:#fbbf24}
.tier-tag.t3{background:rgba(96,165,250,.2);color:#60a5fa}
.standings{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:4px}
.standings th{color:#64748b;font-weight:400;padding:3px 4px;text-align:center;border-bottom:1px solid #222}
.standings th:first-child{text-align:left;width:80px}
.standings td{padding:3px 4px;text-align:center;border-bottom:1px solid #111}
.standings td:first-child{text-align:left;font-weight:700}
.standings tr.advance td{background:rgba(34,197,94,.08)}
.standings tr.advance td:first-child{color:#22c55e}
.standings tr.third-best td{background:rgba(251,191,36,.08)}
.standings tr.third-best td:first-child{color:#fbbf24}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;margin-bottom:10px}
.bracket-container{overflow-x:auto;padding:8px 0}
.bracket{display:flex;gap:16px;min-width:900px;font-size:10px}
.bracket-round{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:4px}
.bracket-round .r-title{font-size:9px;color:#64748b;text-align:center;margin-bottom:4px;font-weight:700}
.bracket-slot{background:#111;border:1px solid #222;border-radius:8px;padding:6px;text-align:center;min-width:70px}
.bracket-slot .b-team{font-size:10px;font-weight:700}

.bracket-slot .b-note{font-size:7px;color:#64748b}
.auto-refresh{font-size:8px;color:#22c55e;margin-left:4px}
.controls{display:flex;gap:6px;margin-bottom:8px;align-items:center;justify-content:flex-end}
.ctrl-btn{padding:5px 12px;border-radius:14px;border:1px solid #334155;background:#111;color:#94a3b8;font-size:10px;cursor:pointer;font-family:inherit}
</style>

// 传递推理：找共同对手比较比分
function transitiveCompare(home,away){
  const hRec=RECENT[home]||[],aRec=RECENT[away]||[],common=[];
  for(const hm of hRec){
    for(const am of aRec){
      if(hm.o===am.o){
        const hGd=hm.hg-hm.ag,aGd=am.hg-am.ag;
        common.push({opp:hm.o,hS:hm.s,aS:am.s,hGd,aGd});
      }
    }
  }
  return common;
}

function getTacticalClash(home,away){
  const ht=TACTICS[home]||{s:'均衡',vs:{}},at=TACTICS[away]||{s:'均衡',vs:{}};
  const hAdv=ht.vs[at.s]||1.0,aAdv=at.vs[ht.s]||1.0;
  const diff=hAdv-aAdv;
  if(diff>0.12)return{boost:diff*10,note:home+'的【'+ht.s+'】克制'+away+'的【'+at.s+'】'};
  if(diff<-0.12)return{boost:diff*10,note:away+'的【'+at.s+'】克制'+home+'的【'+ht.s+'】'};
  return{boost:0,note:'战术均势: '+ht.s+' vs '+at.s};
}

let weatherCache={},weatherCacheTime=0;
async function getWeather(lat,lon){
  const key=lat+','+lon,now=Date.now();
  if(weatherCache[key]&&now-weatherCacheTime<3600000)return weatherCache[key];
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,precipitation,weather_code,wind_speed_10m');
    const d=await r.json(),cur=d.current||{};
    const w={temp:cur.temperature_2m||22,rain:cur.precipitation||0,wind:cur.wind_speed_10m||8,code:cur.weather_code||0};
    weatherCache[key]=w;weatherCacheTime=now;return w;
  }catch(e){return{temp:22,rain:0,wind:8,code:0}}
}

function weatherImpact(weather,venue){
  if(!venue)return{boost:0,note:'无场馆数据'};
  if(venue.roof==='室内'||venue.roof==='可关闭')return{boost:0,note:'🏟️室内/可关顶·天气无影响'};
  let boost=0,notes=[];
  if(weather.rain>3){boost-=8;notes.push('🌧️暴雨')}
  else if(weather.rain>1){boost-=3;notes.push('🌦️有雨')}
  if(weather.temp>33){boost-=5;notes.push('🔥酷热'+weather.temp+'°C')}
  else if(weather.temp>29){boost-=2;notes.push('☀️偏热'+weather.temp+'°C')}
  if(weather.wind>30){boost-=8;notes.push('💨狂风')}
  else if(weather.wind>18){boost-=3;notes.push('🍃大风')}
  if(venue.alt>2000){boost-=10;notes.push('⛰️高原'+venue.alt+'m')}
  else if(venue.alt>1000){boost-=5;notes.push('🏔️高海拔'+venue.alt+'m')}
  return{boost,note:notes.length>0?notes.join('·'):'🌤️天气正常'};
}

// 四层特征预测引擎

function fact(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r}
function getH2H(h,a){return H2H[h+'|'+a]||H2H[a+'|'+h]||null}
function formScore(f){let s=0;for(const r of f){if(r==='W')s+=3;else if(r==='D')s+=1}return s/Math.max(1,f.length*3)*100}

let envWeather=0,matchVenue='';
function analyzeMatch(home,away){
  const ht=T[home],at=T[away];if(!ht||!at)return null;

  // ═══ ELO 实力差——最核心指标 ═══
  // 每100分ELO差≈预期净胜0.5球。200分差≈让1球
  const eloGap=ht.elo-at.elo;
  const hEloBase=Math.min(98,Math.max(2,50+eloGap*0.25));
  const aEloBase=Math.min(98,Math.max(2,50-eloGap*0.25));

  // ═══ xG/xGA 净优势 ═══
  // 直接算预期净胜球: (己方xG-对方xGA) vs (对方xG-己方xGA)
  const hNetXg=ht.xG-at.xGA;  // Germany: 2.0-1.1=0.9
  const aNetXg=at.xG-ht.xGA;  // Ecuador: 1.1-1.0=0.1
  // 映射到0-100: 每0.1净xG≈7分，差距0.8≈56分
  const hXgScore=Math.min(98,Math.max(2,50+hNetXg*70));
  const aXgScore=Math.min(98,Math.max(2,50+aNetXg*70));

  // ═══ T1: 核心基本面 (权重50%，最重要) ═══
  const hPPDA=Math.max(0,(15-ht.ppda)/10*100);
  const aPPDA=Math.max(0,(15-at.ppda)/10*100);

  const aShC=at.shotC*500;
  const hSv=ht.saveP*100;
  const aSv=at.saveP*100;
  const hOdds=Math.max(5,100-Math.log10(ht.o||5000)*12);
  const aOdds=Math.max(5,100-Math.log10(at.o||5000)*12);
  // ELO权重最高，因为它综合了所有历史表现

  const aT1=(aEloBase*0.35+aXgScore*0.25+aPPDA*0.10+aShC*0.10+aSv*0.10+aOdds*0.10);

  // ═══ T2: 决定性变量 (权重25%) ═══
  const hVal=Math.min(100,Math.log10(ht.val+1)*20);

  // 天气/海拔修正：恶劣条件双方都受影响（技术流更明显）
  var wMod=envWeather||0;
  hBase*=(1+wMod/200);aBase*=(1-wMod/200);
  // 传递推理修正：对共同对手表现更好的一方+优势
  if(transBoost>0)hBase*=1+Math.abs(transBoost)/200;
  else if(transBoost<0)aBase*=1+Math.abs(transBoost)/200;
  // 战术相克修正
  var tBoost=tactics.boost||0;
  if(tBoost>0)hBase*=1+tBoost/200;else if(tBoost<0)aBase*=1-tBoost/200;
  // 新闻舆情修正（来自Reddit抓取）
  var hNewsMod=1+(ht.news||0)*0.01,aNewsMod=1+(at.news||0)*0.01;
  hBase*=hNewsMod;aBase*=aNewsMod;
  // 通勤疲劳：长途旅行+累积里程→体能下降（每1000km扣3%）
  var hTravMod=1-(ht.trav||0)*0.00003,aTravMod=1-(at.trav||0)*0.00003;
  hBase*=hTravMod;aBase*=aTravMod;
  // 气候适应：不适应当地气候→表现打折（clim越低扣越多）
  var hClimMod=0.85+(ht.clim||0.7)*0.15,aClimMod=0.85+(at.clim||0.7)*0.15;
  hBase*=hClimMod;aBase*=aClimMod;
  var hLambda=Math.max(0.2,hBase*(aFragile?1.3:1)*hCB);
  var aLambda=Math.max(0.2,aBase*(hFragile?1.3:1)*aCB);

  return{
    hTotal:Math.round(hTotal),aTotal:Math.round(aTotal),
    // T1分解
    hT1:Math.round(hT1),aT1:Math.round(aT1),
    hXg:Math.round(hXgScore),aXg:Math.round(aXgScore),
    hElo:Math.round(hEloBase),aElo:Math.round(aEloBase),
    // T2分解
    hT2:Math.round(hT2),aT2:Math.round(aT2),
    hVal:Math.round(hVal),aVal:Math.round(aVal),
    hDep:Math.round(hDep),aDep:Math.round(aDep),
    hDisc:Math.round(hDisc),aDisc:Math.round(aDisc),
    hNews:Math.round(hNews),aNews:Math.round(aNews),
    // T3分解
    hT3:Math.round(hT3),aT3:Math.round(aT3),
    hMot:Math.round(hMot),aMot:Math.round(aMot),
    hH2H:Math.round(hH2H),aH2H:Math.round(aH2H),
    // N
    hForm:Math.round(hForm),aForm:Math.round(aForm),
    // 其他
    pH2H,nH2H,mystics,hLambda,aLambda,hVenue,aVenue,
    rivalryNote,transNote,wNote:weatherNote,tacticsNote:tactics.note,
    hBigWin:hTraits.bigWin,aResilience:aTraits.resilience,blowoutBoost:Math.round((blowoutBoost-1)*100),
    hxG:ht.xG,hxGA:ht.xGA,axG:at.xG,axGA:at.xGA,
  };
}

function predict(home,away){
  const a=analyzeMatch(home,away);
  if(!a)return{scores:[{score:'?',prob:'0'}],hWin:0,draw:0,aWin:0,analysis:a};
  const scores=[];
  for(let h=0;h<=6;h++)for(let aw=0;aw<=6;aw++){
    const ph=Math.exp(-a.hLambda)*Math.pow(a.hLambda,h)/fact(h);
    const pa=Math.exp(-a.aLambda)*Math.pow(a.aLambda,aw)/fact(aw);
    if(ph*pa>0.001)scores.push({h,aw,p:ph*pa});
  }
  scores.sort((x,y)=>y.p-x.p);
  const top3=scores.slice(0,3).map(s=>({score:s.h+'-'+s.aw,prob:(s.p*100).toFixed(1)}));
  let hWin=0,draw=0,aWin=0;
  for(const s of scores.slice(0,20)){if(s.h>s.aw)hWin+=s.p;else if(s.h<s.aw)aWin+=s.p;else draw+=s.p;}
  const t=hWin+draw+aWin;
  return{scores:top3,hWin:Math.round(hWin/t*100),draw:Math.round(draw/t*100),aWin:Math.round(aWin/t*100),analysis:a};
}

async function fetchScores(){
  try{
    const now=new Date();const dates=[];
    for(let i=-1;i<=1;i++){const d=new Date(now);d.setDate(d.getDate()+i);dates.push(d.toISOString().slice(0,10).replace(/-/g,''))}
    let changed=false;
    for(const date of dates){
      const resp=await fetch(ESPN_BASE+'?dates='+date);
      if(!resp.ok)continue;
      const data=await resp.json();
      for(const e of data.events||[]){
        const comp=(e.competitions||[])[0];if(!comp)continue;
        const teams=comp.competitors||[];if(teams.length<2)continue;
        const hAbbr=teams[0].team.abbreviation,aAbbr=teams[1].team.abbreviation;
        const hName=ESPN_MAP[hAbbr]||teams[0].team.displayName;
        const aName=ESPN_MAP[aAbbr]||teams[1].team.displayName;
        const status=(e.status&&e.status.type&&e.status.type.description)||'';
        if(status==='Full Time'||status.indexOf('Final')>=0){
          const key=hName+'|'+aName,hScore=parseInt(teams[0].score)||0,aScore=parseInt(teams[1].score)||0;
          const old=RESULTS[key];
          if(!old||old[0]!==hScore||old[1]!==aScore){RESULTS[key]=[hScore,aScore];changed=true}
        }
      }
    }
    if(changed){saveResults();renderAll()}
    updateStatus();return true
  }catch(e){console.warn('ESPN:',e.message)}
  return false
}

      const url='https://www.reddit.com/r/soccer/search.json?q='+q+'&sort=new&restrict_sr=on&limit=5&t=week';
      const resp=await fetch(url);

      if(posts.length===0)continue;

      const cn=EN_CN[en];if(!cn||!T[cn])continue;
      var headlines=[];let sentScore=0,injuryCount=0,disciplineChange=0;
      for(const p of posts){
        const title=p.data.title||'';
        const titleLow=title.toLowerCase();
        const ups=p.data.ups||0;
        const weight=Math.min(3,1+ups*0.01);

        // 存标题
        var emoji='➖';var label='';
        let pos=0,neg=0,inj=0;
        for(const w of SENT_POS){if(titleLow.includes(w))pos++}

        for(const w of INJURY_WORDS){if(titleLow.includes(w)){inj++;label='🏥'}}

  if(a.wNote)html+=`<div style="font-size:8px;color:#60a5fa;margin-top:2px">${a.wNote}</div>`;
  if(a.tacticsNote)html+=`<div style="font-size:8px;color:#fbbf24;margin-top:1px">⚔️ ${a.tacticsNote}</div>`;

  var hNews=NEWS_FEED[home]||[],aNews=NEWS_FEED[away]||[];
  if(hNews.length){html+='<div style="font-size:7px;color:#22c55e;margin:2px 0">'+home+'：</div>';
    for(var ni=0;ni<Math.min(hNews.length,3);ni++)html+='<div style="font-size:7px;color:#94a3b8;padding:1px 0">'+hNews[ni].e+' '+hNews[ni].t.substring(0,60)+(hNews[ni].u>20?' 🔥':'')+'</div>';}
  else{html+='<div style="font-size:7px;color:#334155;margin:2px 0">'+home+'：暂无最新舆情 · 访问腾讯体育 worldcup.qq.com</div>';}
  if(aNews.length){html+='<div style="font-size:7px;color:#60a5fa;margin:2px 0">'+away+'：</div>';
    for(var nj=0;nj<Math.min(aNews.length,3);nj++)html+='<div style="font-size:7px;color:#94a3b8;padding:1px 0">'+aNews[nj].e+' '+aNews[nj].t.substring(0,60)+(aNews[nj].u>20?' 🔥':'')+'</div>';}

  html+='</div>';
  return html;
}

// ═══════════════════════════════════════════
// GROUP STANDINGS + BRACKET + VIEWS
// ═══════════════════════════════════════════
function getStandings(grp){
  const teams=GROUPS[grp].map(t=>({name:t,pts:0,gf:0,ga:0,gd:0,pl:0,w:0,d:0,l:0}));
  for(const m of SCHEDULE.filter(m=>m.grp===grp)){
    const r=getResult(m);if(!r)continue;
    const hi=teams.findIndex(t=>t.name===m.home),ai=teams.findIndex(t=>t.name===m.away);
    teams[hi].pl++;teams[ai].pl++;teams[hi].gf+=r[0];teams[hi].ga+=r[1];teams[ai].gf+=r[1];teams[ai].ga+=r[0];
    if(r[0]>r[1]){teams[hi].pts+=3;teams[hi].w++;teams[ai].l++}else if(r[0]<r[1]){teams[ai].pts+=3;teams[ai].w++;teams[hi].l++}else{teams[hi].pts+=1;teams[ai].pts+=1;teams[hi].d++;teams[ai].d++}
  }
  for(const t of teams)t.gd=t.gf-t.ga;
  teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  return teams;
}
function getAllStandings(){
  const all=[];
  for(const g of Object.keys(GROUPS)){const s=getStandings(g);s.forEach((t,i)=>{t.grp=g;t.pos=i+1;t.advance=i<2});all.push(...s);}
  const thirds=all.filter(t=>t.pos===3).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  thirds.forEach((t,i)=>{t.bestThird=i<8;t.thirdRank=i+1});
  return all;
}
function renderGroups(){
  let html='';
  for(const g of Object.keys(GROUPS)){
    const s=getStandings(g);
    html+=`<div class="card"><h3>${g}组</h3><table class="standings"><tr><th>球队</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净</th><th>分</th></tr>`;
    for(const t of s){let cls='';if(t.pos<=2)cls='advance';html+=`<tr class="${cls}"><td>${flag(t.name)} ${t.name}</td><td>${t.pl}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gd>0?'+':''}${t.gd}</td><td style="font-weight:900">${t.pts}</td></tr>`;}
    html+=`</table></div>`;
  }
  document.getElementById('groupStandings').innerHTML=html;
}
function getQualifiedTeams(){
  const all=getAllStandings(),qualified=[];
  for(const g of Object.keys(GROUPS)){const gt=all.filter(t=>t.grp===g);qualified.push(...gt.filter(t=>t.pos<=2).map(t=>({...t,seed:'G'+g+t.pos})));}
  const thirds=all.filter(t=>t.pos===3&&t.bestThird);thirds.forEach(t=>qualified.push({...t,seed:'3rd-'+t.thirdRank}));
  return qualified.sort((a,b)=>{const o={'G':0,'3':1};return(o[a.seed[0]]||0)-(o[b.seed[0]]||0)||a.grp.localeCompare(b.grp)||a.pos-b.pos;});
}
function renderBracket(){
  const qualified=getQualifiedTeams(),hasRealData=qualified.filter(t=>t.pts>0||t.pl>0).length>=4;
  const rounds=['1/16决赛','1/8决赛','1/4决赛','半决赛','决赛'],slots=[16,8,4,2,1];
  let bt=hasRealData?qualified.slice(0,32):[];
  let html='<div class="bracket">';
  for(let ri=0;ri<rounds.length;ri++){
    html+=`<div class="bracket-round"><div class="r-title">${rounds[ri]}</div>`;
    for(let si=0;si<slots[ri];si++){
      let c='';
      if(ri===0&&bt[si*2]&&bt[si*2+1]){const t1=bt[si*2],t2=bt[si*2+1];c=`<div class="b-team">${flag(t1.name)} ${t1.name}</div><div style="font-size:8px;color:#64748b">vs</div><div class="b-team">${flag(t2.name)} ${t2.name}</div><div class="b-note">${t1.grp}组${t1.pos} vs ${t2.grp}组${t2.pos}</div>`;}
      else if(ri===0)c=`<div class="b-team pending">待定</div><div style="font-size:8px;color:#64748b">vs</div><div class="b-team pending">待定</div>`;
      else c=`<div class="b-team pending">—</div><div class="b-note">R${ri+1}胜者</div>`;
      html+=`<div class="bracket-slot" style="margin-bottom:${ri<3?4:0}px">${c}</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  if(!hasRealData)html='<div style="text-align:center;padding:40px;color:#64748b">⚠️ 小组赛数据不足<br>请先输入比赛结果</div>';
  document.getElementById('bracketView').innerHTML=html;
}
